services:
  arklet-minter:
    container_name: arklet_minter
    restart: always
    build:
      context: .
      target: prod
      dockerfile: ./Dockerfile
    command: /app/entrypoint.sh
    volumes:
      - ./ark:/app/ark
      - ./arklet:/app/arklet
      - static_volume:/app/static
    env_file:
      - ./docker/env.prod
    environment:
      ARKLET_PORT: "8080"
    expose:
      - 8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthcheck')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  arklet-resolver:
    container_name: arklet_resolver
    restart: always
    build:
      context: .
      target: prod
      dockerfile: ./Dockerfile
    command: /app/entrypoint.sh
    volumes:
      - ./ark:/app/ark
      - ./arklet:/app/arklet
      - static_volume:/app/static
    env_file:
      - ./docker/env.prod
    environment:
      ARKLET_PORT: "8000"
      RESOLVER: "true"
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  nginx:
    restart: always
    profiles: ["nginx"]
    build: ./nginx
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    depends_on:
      - arklet-minter
      - arklet-resolver
    volumes:
      - static_volume:/app/static

volumes:
  static_volume:
